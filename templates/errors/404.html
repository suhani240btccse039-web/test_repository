<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | SafeCampus</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --crimson:#C8102E; --ink:#0D0D0D; --ash:#F7F5F2; --slate:#8A8A8A; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--ash); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
    .num { font-family:'DM Serif Display',serif; font-size:8rem; color:var(--crimson); line-height:1; opacity:0.15; }
    .title { font-family:'DM Serif Display',serif; font-size:2rem; margin-bottom:12px; }
    .sub { color:var(--slate); font-size:0.9rem; margin-bottom:28px; }
    a { display:inline-block; background:var(--ink); color:white; padding:12px 28px; text-decoration:none; font-size:0.82rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; }
  </style>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1 class="title">Page Not Found</h1>
    <p class="sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}">Back to Home</a>
  </div>
</body>
</html>
